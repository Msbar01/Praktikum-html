<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In & Sign Up - Tema Teknologi</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0f0f23, #1a1a2e);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            border-radius: 10px;
            padding: 30px;
            width: 400px;
            box-shadow: 0 0 20px #00ffff;
            text-align: center;
        }
        h2 {
            color: #00ffff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ffff;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            text-align: left;
        }
        input {
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #00ffff;
            border-radius: 5px;
            background: #1a1a2e;
            color: #ffffff;
            font-family: 'Courier New', monospace;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 10px #00ffff;
        }
        button {
            padding: 10px;
            background: #00ffff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #00cccc;
        }
        .toggle {
            margin-top: 20px;
            cursor: pointer;
            color: #00ffff;
        }
        .toggle:hover {
            text-decoration: underline;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="signin-form">
            <h2>Sign In</h2>
            <form>
                <label for="signin-email">Email:</label>
                <input type="email" id="signin-email" name="email" required>
                
                <label for="signin-password">Password:</label>
                <input type="password" id="signin-password" name="password" required>
                
                <button type="submit">Login</button>
            </form>
            <div class="toggle" onclick="toggleForm()">Belum punya akun? Sign Up</div>
        </div>
        
        <div id="signup-form" class="hidden">
            <h2>Sign Up</h2>
            <form>
                <label for="signup-name">Nama:</label>
                <input type="text" id="signup-name" name="name" required>
                
                <label for="signup-email">Email:</label>
                <input type="email" id="signup-email" name="email" required>
                
                <label for="signup-password">Password:</label>
                <input type="password" id="signup-password" name="password" required>
                
                <label for="signup-confirm-password">Konfirmasi Password:</label>
                <input type="password" id="signup-confirm-password" name="confirm-password" required>
                
                <label for="signup-address">Alamat:</label>
                <input type="text" id="signup-address" name="address" required>
                
                <label for="signup-age">Usia:</label>
                <input type="number" id="signup-age" name="age" min="1" required>
                
                <button type="submit">Daftar</button>
            </form>
            <div class="toggle" onclick="toggleForm()">Sudah punya akun? Sign In</div>
        </div>
    </div>

    <script>
        function toggleForm() {
            const signin = document.getElementById('signin-form');
            const signup = document.getElementById('signup-form');
            signin.classList.toggle('hidden');
            signup.classList.toggle('hidden');
        }
    </script>
</body>
</html>

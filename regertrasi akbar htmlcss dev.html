<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi & Login - Tema Hacker</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #00ff00;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text fill="%2300ff00" font-size="10" x="10" y="20">0101010101</text><text fill="%2300ff00" font-size="10" x="10" y="40">1010101010</text><text fill="%2300ff00" font-size="10" x="10" y="60">0101010101</text></svg>') repeat;
            opacity: 0.1;
            animation: scroll 10s linear infinite;
        }
        @keyframes scroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(100px); }
        }
        .container {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 30px;
            width: 400px;
            box-shadow: 0 0 20px #00ff00;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        h2 {
            color: #00ff00;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff00;
            animation: glitch 2s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            text-align: left;
        }
        input {
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #00ff00;
            border-radius: 5px;
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 10px #00ff00;
        }
        button {
            padding: 10px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #00cc00;
        }
        .toggle {
            margin-top: 20px;
            cursor: pointer;
            color: #00ff00;
        }
        .toggle:hover {
            text-decoration: underline;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-form">
            <h2>Login</h2>
            <form>
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" name="email" required>
                
                <label for="login-password">Password:</label>
                <input type="password" id="login-password" name="password" required>
                
                <button type="submit">Masuk</button>
            </form>
            <div class="toggle" onclick="toggleForm()">Belum punya akun? Registrasi</div>
        </div>
        
        <div id="registrasi-form" class="hidden">
            <h2>Registrasi</h2>
            <form>
                <label for="reg-nama">Nama:</label>
                <input type="text" id="reg-nama" name="nama" required>
                
                <label for="reg-email">Email:</label>
                <input type="email" id="reg-email" name="email" required>
                
                <label for="reg-password">Password:</label>
                <input type="password" id="reg-password" name="password" required>
                
                <label for="reg-confirm-password">Konfirmasi Password:</label>
                <input type="password" id="reg-confirm-password" name="confirm-password" required>
                
                <label for="reg-alamat">Alamat:</label>
                <input type="text" id="reg-alamat" name="alamat" required>
                
                <label for="reg-usia">Usia:</label>
                <input type="number" id="reg-usia" name="usia" min="1" required>
                
                <button type="submit">Daftar</button>
            </form>
            <div class="toggle" onclick="toggleForm()">Sudah punya akun? Login</div>
        </div>
    </div>

    <script>
        function toggleForm() {
            const login = document.getElementById('login-form');
            const registrasi = document.getElementById('registrasi-form');
            login.classList.toggle('hidden');
            registrasi.classList.toggle('hidden');
        }
    </script>
</body>
</html>
